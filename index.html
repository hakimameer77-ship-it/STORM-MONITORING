<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StormWatch Pro | Mobile Responsive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="flash-effect" class="flash-overlay"></div>
    
    <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

    <div class="app-wrapper">
        <aside class="cyber-sidebar" id="sidebar">
            <div class="sidebar-brand">
                <div class="neon-logo"><i class="fa-solid fa-bolt-lightning"></i> STORM<span>WATCH</span></div>
                <button class="close-sidebar" onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
            </div>

            <nav class="nav-links">
                <div class="nav-item active" data-page="dashboard"><i class="fa-solid fa-gauge-high"></i> Dashboard</div>
                <div class="nav-item" data-page="history"><i class="fa-solid fa-list-ul"></i> Log Sejarah</div>
                <div class="nav-item" data-page="analytics"><i class="fa-solid fa-microchip"></i> Sistem IoT</div>
            </nav>

            <div class="sidebar-status-card">
                <div class="status-header">
                    <span>BLYNK NODE</span>
                    <span id="connection-dot" class="dot-offline"></span>
                </div>
                <h4 id="connection-status">DISCONNECTED</h4>
                <p id="last-sync">No Active Data</p>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-nav">
                <div class="nav-left">
                    <button class="menu-toggle" onclick="toggleSidebar()">
                        <i class="fa-solid fa-bars-staggered"></i>
                    </button>
                    <div class="search-info">
                        <h1>Storm Monitoring</h1>
                        <p>UTHM Pagoh Hub</p>
                    </div>
                </div>
                <div class="live-clock" id="clock">00:00:00</div>
            </header>

            <div class="content-container">
                <section id="dashboard" class="page-section active">
                    <div class="alert-banner" id="system-banner">WAITING FOR BLYNK...</div>

                    <div class="main-stats-grid">
                        <div class="glass-card main-val-card">
                            <span class="card-label">JARAK PROXIMITY</span>
                            <div class="value-display">
                                <h2 id="dist-val">--</h2>
                                <span class="unit">KM</span>
                            </div>
                            <div class="cyber-progress">
                                <div id="dist-bar" class="bar" style="width: 0%"></div>
                            </div>
                        </div>

                        <div class="location-card glass-card">
                            <span class="card-label">LOKASI NODE</span>
                            <h3>Pagoh Hub</h3>
                            <div class="status-pill active">Online</div>
                        </div>
                    </div>

                    <div class="chart-section glass-card">
                        <div class="chart-header">
                            <h3>Live Matrix</h3>
                            <button onclick="exportCSV()" class="btn-neon">CSV</button>
                        </div>
                        <div class="chart-container">
                            <canvas id="liveTimeline"></canvas>
                        </div>
                    </div>
                </section>

                <section id="history" class="page-section">
                    <div class="glass-card table-card">
                        <h3>Event Logs</h3>
                        <div class="table-scroll">
                            <table id="logs-table">
                                <thead>
                                    <tr>
                                        <th>Tahap</th>
                                        <th>Masa</th>
                                        <th>Jarak</th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                            </table>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
